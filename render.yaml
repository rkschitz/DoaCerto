services:
  - type: web
    name: backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doacerto  # <- aqui você usa o nome real do banco
          property: connectionString
    plan: free

  - type: web
    name: frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    plan: free

databases:
  - name: doacerto  # <- aqui também
    plan: free
